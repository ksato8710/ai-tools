appId: studio.craftgarden.ai-tools
productName: AI Tools
mac:
  category: public.app-category.developer-tools
  identity: null
  target:
    - target: dir
      arch:
        - arm64
  icon: build/icon.icns
files:
  - dist-electron/**/*
  - .next/**/*
  - "!.next/cache"
  - public/**/*
  - data/**/*
  - package.json
  - next.config.ts
  - postcss.config.mjs
  - tsconfig.json
  - node_modules/**/*
  - "!node_modules/.cache"
directories:
  output: release
asar: false
extraMetadata:
  main: dist-electron/main.js
